<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supreme IPTV</title>
  <!--
    Supreme IPTV Custom Cast Receiver  (App ID: 35D1A927)
    Hosted at: https://t0rque.github.io/SimpleTv-Receiver/

    Strategy:
      .ts URLs   → sender resolves the 302 redirect from the phone (residential IP)
                   → if CDN is HTTPS: sender passes CDN URL directly
                   → if CDN is HTTP: sender wraps in HTTPS proxy URL
                   → receiver plays whatever HTTPS URL it receives via mpegts.js
                   NOTE: HTTPS receiver cannot XHR/fetch HTTP URLs (active mixed content).
      .m3u8 URLs → play via hls.js  (robust HLS)
      other       → hand off to CAF built-in player  (mp4, mkv, etc.)

    Why mpegts.js?  CAF's Shaka Player cannot play raw video/mp2t live streams.
    mpegts.js uses Media Source Extensions to handle them in Chromecast's Chromium.
  -->
  <!-- No mixed-content upgrade — Chromecast Chromium allows HTTP media from HTTPS receivers.
       Upgrading http→https broke IPTV streams because CDN servers don't have HTTPS certs. -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070d1a; overflow: hidden; font-family: Arial, sans-serif; }
    video { width: 100vw; height: 100vh; object-fit: contain; display: block; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; text-align: center; pointer-events: none;
      background: radial-gradient(ellipse at center, #0d1a30 0%, #070d1a 70%);
      transition: opacity 0.5s ease-out;
    }
    #overlay.hidden { opacity: 0; }
    #overlay .logo { width: 160px; height: 160px; margin-bottom: 28px; border-radius: 28px; }
    #overlay h1 { font-size: 52px; font-weight: 700; letter-spacing: 2px; color: #00d4ff; text-shadow: 0 0 24px rgba(0,212,255,0.5); }
    #overlay p { font-size: 22px; opacity: 0.6; margin-top: 12px; color: #a0c8e0; letter-spacing: 1px; }
    /* ── Session timer (always visible — bottom-left) ────────────── */
    #session-timer {
      position: absolute; bottom: 24px; left: 24px;
      background: rgba(0,0,0,0.7); color: #aaa; font-size: 13px;
      font-family: monospace; padding: 5px 10px; border-radius: 6px;
      pointer-events: none;
    }
    /* ── Debug log bar (only shown in #debug mode) ──────────────── */
    #status-bar {
      position: absolute; bottom: 52px; left: 24px;
      background: rgba(0,0,0,0.85); color: #0f0; font-size: 15px;
      font-family: monospace; padding: 8px 14px; border-radius: 8px;
      max-width: 90%; word-break: break-all;
      transition: opacity 0.3s ease-out;
      display: none; /* hidden by default — shown only in #debug mode */
    }
    #status-bar.visible { display: block; }
    #status-bar.fade { opacity: 0; }

    /* ── Channel-switching overlay ───────────────────────────────── */
    #switch-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(7, 13, 26, 0.88);
      color: #fff; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.25s ease-in-out;
    }
    #switch-overlay.visible { opacity: 1; }
    #switch-overlay .spinner {
      width: 56px; height: 56px; border-radius: 50%;
      border: 5px solid rgba(0,212,255,0.2);
      border-top-color: #00d4ff;
      animation: spin 0.8s linear infinite;
      margin-bottom: 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #switch-overlay .ch-name {
      font-size: 32px; font-weight: 700; color: #fff;
      letter-spacing: 1px; max-width: 80%;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    #switch-overlay .ch-sub {
      font-size: 18px; color: #a0c8e0; margin-top: 10px; opacity: 0.75;
    }

    /* ── Buffering badge ─────────────────────────────────────────── */
    #buffering-badge {
      position: absolute; top: 24px; right: 24px;
      background: rgba(0,0,0,0.7); color: #ffcc00;
      font-size: 16px; font-family: Arial, sans-serif;
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,204,0,0.4);
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease-in-out;
    }
    #buffering-badge.visible { opacity: 1; }

    /* ── "Now Playing" toast (fades in then out) ─────────────────── */
    #now-playing {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: #fff;
      font-size: 20px; font-family: Arial, sans-serif; font-weight: 600;
      padding: 12px 28px; border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity 0.4s ease-in-out;
    }
    #now-playing.visible { opacity: 1; }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline></video>

  <!-- Idle splash -->
  <div id="overlay">
    <img class="logo" src="./icon.png" alt="Supreme IPTV">
    <h1>SUPREME IPTV</h1>
    <p>Ready to cast…</p>
  </div>

  <!-- Channel switching overlay (spinner + name) -->
  <div id="switch-overlay">
    <div class="spinner"></div>
    <div class="ch-name" id="switch-ch-name">Loading…</div>
    <div class="ch-sub" id="switch-ch-sub">Switching channel</div>
  </div>

  <!-- Buffering badge (top-right corner) -->
  <div id="buffering-badge">⏳ Buffering…</div>

  <!-- Now playing toast (bottom centre, fades out) -->
  <div id="now-playing" id="now-playing-text"></div>

  <!-- Session timer (always visible — helps diagnose 5-min crash timing) -->
  <div id="session-timer">00:00</div>

  <!-- Debug log bar (only visible in #debug mode) -->
  <div id="status-bar"></div>

  <script>
    const video          = document.getElementById('v');
    const overlay        = document.getElementById('overlay');
    const statusBar      = document.getElementById('status-bar');
    const switchOverlay  = document.getElementById('switch-overlay');
    const switchChName   = document.getElementById('switch-ch-name');
    const switchChSub    = document.getElementById('switch-ch-sub');
    const bufferingBadge = document.getElementById('buffering-badge');
    const nowPlaying     = document.getElementById('now-playing');

    // Debug mode: add #debug to the receiver URL to show the log bar
    const DEBUG_MODE = location.hash.includes('debug');
    if (DEBUG_MODE) statusBar.classList.add('visible');

    // Session timer — always visible, bottom-left corner.
    // Shows elapsed time since receiver loaded. Used to diagnose 5-min crash:
    // if crash is at exactly 5:00 → CAF idle timeout; other time → different cause.
    const sessionTimerEl = document.getElementById('session-timer');
    const sessionStart = Date.now();
    setInterval(() => {
      const s = Math.floor((Date.now() - sessionStart) / 1000);
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      sessionTimerEl.textContent = m + ':' + sec;
    }, 1000);

    let activePlayer     = null;
    let statusHideTimer  = null;
    let switchTimer      = null;
    let nowPlayingTimer  = null;
    let reconnectTimer   = null;  // module-level — cleared in destroyPlayer()
    let startupWatchdogTimer = null; // catches silent startup stalls after recycle
    let reconnectCount   = 0;    // reset on each new channel load
    let currentChannel   = '';
    let liveRefreshTimer = null;
    let currentLiveOriginalUrl = '';
    let currentLiveMode = null;
    const LIVE_REFRESH_MS = 4 * 60 * 1000;

    // ── Heartbeat — keeps Cast session alive when PlayerManager is IDLE ──
    // Returning null from LOAD leaves CAF in IDLE state. Without activity,
    // the Cast framework kills the receiver after ~5 min. We send a ping
    // every 30s so the session channel stays active from both sides.
    const HEARTBEAT_NS = 'urn:x-cast:com.supremeiptv.heartbeat';
    let heartbeatInterval = null;

    function startHeartbeat() {
      stopHeartbeat();
      heartbeatInterval = setInterval(() => {
        try {
          context.sendCustomMessage(HEARTBEAT_NS, undefined, { type: 'ping', ts: Date.now() });
          log('💓 Heartbeat ping sent');
        } catch(e) {
          // Non-fatal — session may be ending
        }
      }, 30000);
      log('💓 Heartbeat started (30s interval)');
    }

    function stopHeartbeat() {
      if (heartbeatInterval) {
        clearInterval(heartbeatInterval);
        heartbeatInterval = null;
      }
    }

    /* ── Logging ──────────────────────────────────────────────────── */
    function log(msg) {
      console.log('[SupremeIPTV] ' + msg);
      if (DEBUG_MODE) {
        statusBar.textContent = msg;
        statusBar.classList.remove('fade');
      }
    }
    function logThenHide(msg, delayMs = 4000) {
      log(msg);
      if (DEBUG_MODE) {
        clearTimeout(statusHideTimer);
        statusHideTimer = setTimeout(() => statusBar.classList.add('fade'), delayMs);
      }
    }

    /* ── Channel-switching overlay ───────────────────────────────── */
    function showSwitching(channelName) {
      currentChannel = channelName || 'Loading…';
      switchChName.textContent = currentChannel;
      switchChSub.textContent = 'Switching channel';
      switchOverlay.classList.add('visible');
      clearTimeout(switchTimer);
      // Safety: auto-hide after 12s in case playback events don't fire
      switchTimer = setTimeout(() => hideSwitching(), 12000);
    }
    function hideSwitching() {
      clearTimeout(switchTimer);
      switchOverlay.classList.remove('visible');
    }

    /* ── Now Playing toast ───────────────────────────────────────── */
    function showNowPlaying(name) {
      nowPlaying.textContent = '▶ ' + (name || 'Playing');
      nowPlaying.classList.add('visible');
      clearTimeout(nowPlayingTimer);
      nowPlayingTimer = setTimeout(() => nowPlaying.classList.remove('visible'), 3500);
    }

    /* ── Buffering badge ─────────────────────────────────────────── */
    function setBuffering(on) {
      if (on) bufferingBadge.classList.add('visible');
      else    bufferingBadge.classList.remove('visible');
    }

    function clearLiveRefreshTimer() {
      if (liveRefreshTimer) {
        clearTimeout(liveRefreshTimer);
        liveRefreshTimer = null;
      }
    }

    async function refreshLiveStream(reason) {
      clearLiveRefreshTimer();
      if (!currentLiveOriginalUrl || !currentLiveMode) {
        log('ℹ️ Live refresh skipped — no original live URL available');
        return;
      }
      try {
        log('🔄 ' + reason + ' — refreshing live stream token…');
        const refreshUrl = withCacheBust(currentLiveOriginalUrl);
        if (currentLiveMode === 'hls') {
          playHls(refreshUrl, currentLiveOriginalUrl);
        } else {
          playMpegTs(refreshUrl, currentLiveOriginalUrl);
        }
      } catch (e) {
        log('⚠️ Live refresh failed: ' + (e && e.message ? e.message : e));
      }
    }

    function scheduleLiveRefresh() {
      clearLiveRefreshTimer();
      if (!currentLiveOriginalUrl || !currentLiveMode) return;
      liveRefreshTimer = setTimeout(() => {
        liveRefreshTimer = null;
        refreshLiveStream('Proactive refresh before token expiry');
      }, LIVE_REFRESH_MS);
      log('⏱️ Live refresh scheduled in ' + Math.round(LIVE_REFRESH_MS / 1000) + 's');
    }

    /* ── Player cleanup ───────────────────────────────────────────── */
    function destroyPlayer() {
      // Cancel any pending reconnect — prevents zombie timers destroying the next channel's player
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      clearLiveRefreshTimer();
      stopHeartbeat();
      if (startupWatchdogTimer) {
        clearTimeout(startupWatchdogTimer);
        startupWatchdogTimer = null;
      }
      if (!activePlayer) return;
      try { activePlayer.destroy(); } catch(e) {}
      activePlayer = null;
      video.src = '';
      video.load();
    }

    function withCacheBust(url) {
      try {
        const u = new URL(url);
        u.searchParams.set('_cb', Date.now().toString());
        return u.toString();
      } catch (e) {
        const sep = url.includes('?') ? '&' : '?';
        return url + sep + '_cb=' + Date.now();
      }
    }

    /* ── Reconnect helper (shared across live stream types) ─────────
       Defined at module level so both mpegts.js error handler and the
       video element error handler can call it.                       */
    const MAX_RECONNECTS = 5;
    function scheduleReconnect(delayMs, reason) {
      if (reconnectTimer) return; // already scheduled
      if (reconnectCount >= MAX_RECONNECTS) {
        log('❌ Max reconnects reached — giving up');
        hideSwitching();
        setBuffering(false);
        return;
      }
      reconnectCount++;
      log('🔄 ' + reason + ' — reconnecting in ' + (delayMs / 1000).toFixed(0) + 's… (attempt ' + reconnectCount + '/' + MAX_RECONNECTS + ')');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        refreshLiveStream('Reconnect after stream failure');
      }, delayMs);
    }

    /* ── MPEG-TS live streams — mpegts.js via CF proxy ──────────────────
       The phone resolves the CDN redirect from a residential IP, then wraps
       the CDN URL in the CF proxy for HTTPS delivery. mpegts.js can fetch
       the CF proxy URL (HTTPS + Access-Control-Allow-Origin:*) without any
       CORS or mixed-content issue.
       The 5-minute crash was purely the dual refresh timer race — now fixed
       via idleTimeoutMs + removed scheduleLiveRefresh calls.              */
    function playMpegTs(url, originalLiveUrl = '') {
      destroyPlayer();
      currentLiveOriginalUrl = originalLiveUrl || currentLiveOriginalUrl || '';
      currentLiveMode = 'mpegts';
      overlay.classList.add('hidden');
      hideSwitching();

      log('▶️ mpegts.js: ' + url.substring(0, 70));
      const p = mpegts.createPlayer({
        type: 'mpegts',
        isLive: true,
        url: url,
      }, {
        enableWorker: true,
        enableStashBuffer: true,
        liveBufferLatencyChasing: false,
        lazyLoad: false,
        autoCleanupSourceBuffer: true,
        autoCleanupMinBackwardDuration: 30,
        autoCleanupMaxBackwardDuration: 60,
      });
      p.attachMediaElement(video);
      p.load();
      p.on(mpegts.Events.ERROR, (errType, errDetail) => {
        log('❌ mpegts error: ' + errType + ' / ' + errDetail);
        if (errType === mpegts.ErrorTypes.NETWORK_ERROR || errType === mpegts.ErrorTypes.IO_ERROR) {
          setBuffering(true);
          scheduleReconnect(3000, 'Network error');
        } else {
          setBuffering(false);
        }
      });
      activePlayer = p;
      video.play().catch(e => log('play() rejected: ' + e.message));

      // Startup watchdog: if playback hasn't started in 25s, force reconnect
      startupWatchdogTimer = setTimeout(() => {
        startupWatchdogTimer = null;
        const started = !video.paused && video.readyState >= 2;
        if (started) return;
        log('⏱️ Startup watchdog timeout — forcing reconnect');
        scheduleReconnect(1000, 'Startup stall');
      }, 25000);
      startHeartbeat();
    }

    /* ── hls.js — HLS .m3u8 streams ──────────────────────────────── */
    function playHls(url, originalLiveUrl = '') {
      destroyPlayer();
      currentLiveOriginalUrl = originalLiveUrl || currentLiveOriginalUrl || '';
      currentLiveMode = 'hls';
      if (!Hls.isSupported()) {
        log('▶️ Using native HLS (Hls.js not supported)');
        video.src = url;
        video.play().catch(e => log('native play error: ' + e.message));
        startHeartbeat();
        return;
      }
      log('▶️ hls.js: loading HLS stream…');
      const h = new Hls({
        debug: false,
        maxBufferLength: 30,
        lowLatencyMode: false,
        manifestLoadingTimeOut: 10000,
        manifestLoadingMaxRetry: 3,
      });
      h.loadSource(url);
      h.attachMedia(video);
      h.on(Hls.Events.MANIFEST_PARSED, () => {
        log('✅ HLS manifest ready');
        video.play().catch(e => log('play() rejected: ' + e.message));
      });
      h.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          log('❌ HLS fatal error: ' + data.type);
          console.error('[SupremeIPTV] HLS fatal', data);
          refreshLiveStream('Fatal HLS error');
        }
      });
      activePlayer = h;
      startHeartbeat();
    }

    /* ── Cast LOAD interceptor ────────────────────────────────────── */
    const context       = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (loadRequestData) => {
        const media  = loadRequestData.media;
        const rawUrl = (media.contentUrl || media.contentId || '').trim();
        const ct     = (media.contentType || '').toLowerCase();
        const customData = media.customData || {};
        const originalLiveUrl = (customData.originalLiveUrl || '').trim();

        const channelName = loadRequestData.media?.metadata?.title || '';
        const loadLabel = channelName ? ('📥 Loading: ' + channelName) : ('📥 LOAD: ' + rawUrl.substring(0, 80));
        log(loadLabel);
        console.log('[SupremeIPTV] LOAD  url=' + rawUrl + '  ct=' + ct + '  channel=' + channelName);

      // Reset reconnect counter for new channel
      reconnectCount = 0;

        // CF proxy URLs (/api/stream?url=...) are always live MPEG-TS regardless
        // of extension — the CDN URL often has no extension (e.g. /live/play/TOKEN/20170).
        // Must detect these via the path, not just the .ts extension.
        let isLiveProxy = false;
        if (rawUrl.includes('/api/stream')) {
          try {
            const proxiedUrl = new URL(rawUrl).searchParams.get('url') || '';
            isLiveProxy = !/\.(mp4|mkv|avi|webm)($|\?)/i.test(proxiedUrl);
          } catch(e) { isLiveProxy = true; }
        }
        if (/\.ts($|\?)/i.test(rawUrl) || ct === 'video/mp2t' || isLiveProxy) {
          log('📡 MPEG-TS live stream → mpegts.js');
          playMpegTs(rawUrl, originalLiveUrl || rawUrl);
          return null; // We own playback — bypass CAF
        }

        // ── HLS (.m3u8 or application/*mpegurl) ───────────────────
        if (/\.m3u8($|\?)/i.test(rawUrl) || ct.includes('mpegurl')) {
          playHls(rawUrl, originalLiveUrl || rawUrl);
          return null; // We own playback — bypass CAF
        }

        // ── Anything else (HTTP/HTTPS mp4, mkv, avi, webm) — delegate to CAF ──────
        // MUST destroy any active mpegts.js/HLS.js player first.
        // If a live stream was playing, it holds the <video> element.
        // CAF needs a clean video element or it goes IDLE immediately.
        currentLiveOriginalUrl = '';
        currentLiveMode = null;
        destroyPlayer();
        log('📦 Delegating to CAF player: ' + rawUrl.substring(0, 60));
        return loadRequestData;
      }
    );

    // ── Override reported playerState when custom player is active ─────────
    // When we return null from LOAD (for live streams), CAF's internal state
    // stays IDLE. The sender phone receives MEDIA_STATUS with playerState=IDLE
    // and kills the session after 5 minutes — regardless of idleTimeoutMs.
    // Fix: intercept outgoing MEDIA_STATUS messages and report PLAYING state
    // whenever mpegts.js or hls.js is active, so the sender never sees IDLE.
    try {
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.MEDIA_STATUS,
        (mediaStatus) => {
          if (currentLiveMode && mediaStatus) {
            mediaStatus.playerState = cast.framework.messages.PlayerState.PLAYING;
            if (video) mediaStatus.currentTime = video.currentTime;
          }
          return mediaStatus;
        }
      );
      log('✅ Status override active');
    } catch(e) {
      log('⚠️ Status override unavailable: ' + e.message);
    }

    /* ── Video events ─────────────────────────────────────────────── */
    video.addEventListener('playing', () => {
      if (startupWatchdogTimer) {
        clearTimeout(startupWatchdogTimer);
        startupWatchdogTimer = null;
      }
      // Reset reconnect counter every time we successfully start playing.
      // This means MAX_RECONNECTS is "5 consecutive failures", not "5 total
      // over the lifetime of the session". Without this, a stream that drops
      // and reconnects 5 times over ~5 minutes gives up permanently.
      reconnectCount = 0;
      overlay.classList.add('hidden');
      hideSwitching();
      setBuffering(false);
      showNowPlaying(currentChannel);
      logThenHide('✅ Playing', 3000);
    });
    video.addEventListener('waiting', () => {
      setBuffering(true);
      log('⏳ Buffering…');
    });
    video.addEventListener('stalled', () => {
      setBuffering(true);
      log('⚠️ Stream stalled');
    });
    video.addEventListener('canplay', () => {
      overlay.classList.add('hidden');
      setBuffering(false);
    });
    video.addEventListener('ended', () => {
      setBuffering(false);
      overlay.classList.remove('hidden');
      log('Stream ended');
    });
    video.addEventListener('error', () => {
      hideSwitching();
      setBuffering(false);
      const msg = video.error ? video.error.message : 'unknown error';
      log('❌ Video error: ' + msg);

      // Live stream error handling:
      //   mpegts.js active (activePlayer set) → let mpegts.js handle via Events.ERROR
      //   video.src active (activePlayer null) → schedule reconnect here
      if (currentLiveMode && activePlayer) {
        log('ℹ️ Video error while mpegts.js active — letting it handle reconnect');
        return;
      }
      if (currentLiveMode) {
        log('🔄 Live stream error — scheduling reconnect');
        scheduleReconnect(3000, 'Stream error');
        return;
      }

      // Non-live (movie/VOD): ignore if media is actually playing fine
      const stillPlaying = !video.paused && !video.ended && video.readyState >= 2;
      if (stillPlaying) {
        log('ℹ️ Ignoring error event — media is still playing');
        overlay.classList.add('hidden');
        return;
      }

      overlay.classList.remove('hidden');
    });

    /* ── Start ────────────────────────────────────────────────────── */
    // disableIdleTimeout: true — the CORRECT way to prevent CAF from killing the
    //   session when IDLE. When we return null from the LOAD interceptor for live
    //   streams, CAF stays in IDLE state. The default behaviour is to close the
    //   receiver after 300000ms (5 min) of IDLE — exactly matching the crash.
    //   NOTE: idleTimeoutMs is NOT a real CastReceiverOptions property — docs only
    //   list disableIdleTimeout for this purpose.
    // maxInactivity: 600 — 10 min before closing if phone disconnects (default 10s).
    context.addCustomMessageListener(HEARTBEAT_NS, () => {
      // Phone ping received — session is alive
    });
    context.start({ disableIdleTimeout: true, maxInactivity: 600 });
    log('✅ SimpleTv Receiver ready  (35D1A927)');
    console.log('[SimpleTv] Receiver started — App ID 35D1A927');
  </script>
</body>
</html>
