<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimpleTv Cast Receiver</title>
  <!--
    SimpleTv Custom Cast Receiver  (App ID: 35D1A927)
    Hosted at: https://t0rque.github.io/SimpleTv-Receiver/

    Strategy:
      .ts URLs   → follow the 302 redirect with fetch() to get the CDN URL
                   → play via mpegts.js  (raw MPEG-TS live stream over MSE)
      .m3u8 URLs → play via hls.js  (robust HLS)
      other       → hand off to CAF built-in player  (mp4, mkv, etc.)

    Why mpegts.js?  CAF's Shaka Player cannot play raw video/mp2t live streams.
    mpegts.js uses Media Source Extensions to handle them in Chromecast's Chromium.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    video { width: 100vw; height: 100vh; object-fit: contain; display: block; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; text-align: center; pointer-events: none;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
      transition: opacity 0.5s ease-out;
    }
    #overlay.hidden { opacity: 0; }
    #overlay .icon { font-size: 80px; margin-bottom: 20px; }
    #overlay h1 { font-size: 52px; font-weight: 700; letter-spacing: -1px; }
    #overlay p { font-size: 22px; opacity: 0.7; margin-top: 12px; }
    #status-bar {
      position: absolute; bottom: 24px; left: 24px;
      background: rgba(0,0,0,0.75); color: #0f0; font-size: 18px;
      font-family: monospace; padding: 10px 18px; border-radius: 8px;
      max-width: 90%; word-break: break-all;
      transition: opacity 0.3s ease-out;
    }
    #status-bar.hidden { opacity: 0; }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline></video>
  <div id="overlay">
    <div class="icon">📺</div>
    <h1>SimpleTv</h1>
    <p>Ready to cast…</p>
  </div>
  <div id="status-bar">Initializing…</div>

  <script>
    const video     = document.getElementById('v');
    const overlay   = document.getElementById('overlay');
    const statusBar = document.getElementById('status-bar');
    let activePlayer = null;
    let statusHideTimer = null;

    /* ── Logging ──────────────────────────────────────────────────── */
    function log(msg) {
      console.log('[SimpleTv] ' + msg);
      statusBar.textContent = msg;
      statusBar.classList.remove('hidden');
    }
    function logThenHide(msg, delayMs = 4000) {
      log(msg);
      clearTimeout(statusHideTimer);
      statusHideTimer = setTimeout(() => statusBar.classList.add('hidden'), delayMs);
    }

    /* ── Player cleanup ───────────────────────────────────────────── */
    function destroyPlayer() {
      if (!activePlayer) return;
      try { activePlayer.destroy(); } catch(e) {}
      activePlayer = null;
      video.src = '';
      video.load();
    }

    /* ── Resolve .ts redirect via fetch() ─────────────────────────
       Chromecast Chromium follows 302 redirects automatically.
       response.url is the final URL after all hops.              */
    async function resolveRedirect(url) {
      log('🔍 Resolving redirect for ' + url.substring(0, 60) + '…');
      try {
        const resp = await fetch(url, {
          method: 'GET',
          redirect: 'follow',
          headers: {
            'User-Agent': 'ExoPlayer/2.18.1 (Linux;Android 13) ExoPlayerLib/2.18.1',
            'Accept': '*/*',
          },
        });
        if (resp.body) resp.body.cancel().catch(() => {});
        const finalUrl = resp.url || url;
        if (finalUrl !== url) {
          log('✅ Redirected → ' + finalUrl.substring(0, 70));
        } else {
          log('⚠️ No redirect — using original URL');
        }
        return finalUrl;
      } catch(e) {
        log('⚠️ Redirect fetch failed (' + e.message + ') — using original');
        return url;
      }
    }

    /* ── mpegts.js — raw MPEG-TS live streams ─────────────────────── */
    function playMpegTs(url) {
      destroyPlayer();
      if (typeof mpegts === 'undefined' || !mpegts.isSupported()) {
        log('⚠️ mpegts.js not supported — trying native video element');
        video.src = url;
        video.play().catch(e => log('native play error: ' + e.message));
        return;
      }
      log('▶️ mpegts.js: loading live stream…');
      const p = mpegts.createPlayer({
        type: 'mpegts',
        isLive: true,
        url: url,
      }, {
        enableWorker: true,
        liveBufferLatencyChasing: true,
        liveSync: true,
        liveSyncMaxLatency: 6,
        liveBufferLatencyMaxLatency: 8,
        enableStashBuffer: false,
      });
      p.attachMediaElement(video);
      p.load();
      p.on(mpegts.Events.ERROR, (errType, errDetail) => {
        log('❌ mpegts error: ' + errType + ' — ' + errDetail);
        console.error('[SimpleTv] mpegts error', errType, errDetail);
      });
      activePlayer = p;
      video.play().catch(e => log('play() rejected: ' + e.message));
    }

    /* ── hls.js — HLS .m3u8 streams ──────────────────────────────── */
    function playHls(url) {
      destroyPlayer();
      if (!Hls.isSupported()) {
        log('▶️ Using native HLS (Hls.js not supported)');
        video.src = url;
        video.play().catch(e => log('native play error: ' + e.message));
        return;
      }
      log('▶️ hls.js: loading HLS stream…');
      const h = new Hls({
        debug: false,
        maxBufferLength: 30,
        lowLatencyMode: false,
        manifestLoadingTimeOut: 10000,
        manifestLoadingMaxRetry: 3,
      });
      h.loadSource(url);
      h.attachMedia(video);
      h.on(Hls.Events.MANIFEST_PARSED, () => {
        log('✅ HLS manifest ready');
        video.play().catch(e => log('play() rejected: ' + e.message));
      });
      h.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          log('❌ HLS fatal error: ' + data.type);
          console.error('[SimpleTv] HLS fatal', data);
        }
      });
      activePlayer = h;
    }

    /* ── Cast LOAD interceptor ────────────────────────────────────── */
    const context       = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (loadRequestData) => {
        const media  = loadRequestData.media;
        const rawUrl = (media.contentUrl || media.contentId || '').trim();
        const ct     = (media.contentType || '').toLowerCase();

        log('📥 LOAD: ' + rawUrl.substring(0, 80));
        console.log('[SimpleTv] LOAD  url=' + rawUrl + '  ct=' + ct);

        // Hide splash when media is requested
        overlay.classList.add('hidden');

        // ── Raw MPEG-TS (.ts or video/mp2t) ───────────────────────
        if (/\.ts($|\?)/i.test(rawUrl) || ct === 'video/mp2t') {
          const cdnUrl = await resolveRedirect(rawUrl);
          playMpegTs(cdnUrl);
          return null; // We own playback — bypass CAF
        }

        // ── HLS (.m3u8 or application/*mpegurl) ───────────────────
        if (/\.m3u8($|\?)/i.test(rawUrl) || ct.includes('mpegurl')) {
          playHls(rawUrl);
          return null; // We own playback — bypass CAF
        }

        // ── Anything else (mp4, mkv, etc.) — delegate to CAF ──────
        log('📦 Delegating to CAF player: ' + rawUrl.substring(0, 60));
        return loadRequestData;
      }
    );

    /* ── Video events ─────────────────────────────────────────────── */
    video.addEventListener('playing', () => logThenHide('✅ Playing', 3000));
    video.addEventListener('waiting', () => log('⏳ Buffering…'));
    video.addEventListener('stalled', () => log('⚠️ Stream stalled'));
    video.addEventListener('ended',   () => { overlay.classList.remove('hidden'); log('Stream ended'); });
    video.addEventListener('error',   () => {
      const msg = video.error ? video.error.message : 'unknown error';
      log('❌ Video error: ' + msg);
      overlay.classList.remove('hidden');
    });

    /* ── Start ────────────────────────────────────────────────────── */
    context.start({ maxInactivity: 3600 });
    log('✅ SimpleTv Receiver ready  (35D1A927)');
    console.log('[SimpleTv] Receiver started — App ID 35D1A927');
  </script>
</body>
</html>
